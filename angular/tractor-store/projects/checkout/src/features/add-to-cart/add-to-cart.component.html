@if (variant(); as v) {
  <form class="c_AddToCart" [formGroup]="form" (ngSubmit)="onSubmit()">
    <input type="hidden" formControlName="sku" />
    <div class="c_AddToCart__information">
      <p>{{ v.price }} Ø</p>
      @if (v.inventory > 0) {
        <p class="c_AddToCart__stock c_AddToCart__stock--ok">
          {{ v.inventory }} in stock, free shipping
        </p>
      } @else {
        <p class="c_AddToCart__stock c_AddToCart__stock--empty">out of stock</p>
      }
    </div>
    <ts-button
      type="submit"
      variant="primary"
      extraClass="c_AddToCart__button"
      [disabled]="outOfStock()"
    >
      add to basket
    </ts-button>
    <div
      class="c_AddToCart__confirmed"
      [class.c_AddToCart__confirmed--hidden]="!confirmed()"
      aria-live="polite"
    >
      <p>Tractor was added.</p>
      <a [appNavigateTo]="'checkout.cart'" class="c_AddToCart__link">View in basket.</a>
    </div>
  </form>
} @else if (isLoading()) {
  <p class="c_AddToCart__loading" aria-live="polite">Loading…</p>
}
